// jump
UNBIND MOUSE_WHEEL
  BIND MWHEELDOWN +JUMP
  BIND MWHEELUP   +JUMP
  BIND SPACE      +JB_

// wasd
EXEC "~/NULLS"
  BIND W +W
  BIND A +A
  BIND S +BACK
  BIND D +D

// sprint
  BIND SHIFT +SPRINT

// duck
  BIND CTRL +C_

// mouse
SENSITIVITY 0.5
ZOOM_SENSITIVITY_RATIO 1
M_YAW 0.022
M_PITCH 0.022
  BIND MOUSE_X  YAW
  BIND MOUSE_Y  PITCH
  BIND MOUSE1  +ATTACK
  BIND MOUSE2  +ATTACK2
  BIND MOUSE3   PLAYER_PING
  BIND MOUSE4  +CJ_
  BIND MOUSE5  +JB_

// quick switch hold
ALIAS +SWITCH  SLOT3
ALIAS -SWITCH  LASTINV
  BIND Q      +SWITCH

// slots
ALIAS +S3 "SLOT3; +LOOKATWEAPON"; ALIAS -S3 -LOOKATWEAPON
ALIAS +S4 "SLOT4; +LOOKATWEAPON"; ALIAS -S4 -LOOKATWEAPON
ALIAS +S5 "SLOT5; +LOOKATWEAPON"; ALIAS -S5 -LOOKATWEAPON
ALIAS +S6 "SLOT6; +LOOKATWEAPON"; ALIAS -S6 -LOOKATWEAPON
ALIAS +S7 "SLOT7; +LOOKATWEAPON"; ALIAS -S7 -LOOKATWEAPON
ALIAS +S8 "SLOT8; +LOOKATWEAPON"; ALIAS -S8 -LOOKATWEAPON
ALIAS +S9 "SLOT10;+LOOKATWEAPON"; ALIAS -S9 -LOOKATWEAPON
  BIND 1 SLOT1
  BIND 2 SLOT2
  BIND 3 +S3
  BIND 4 +S4
  BIND 5 +S5
  BIND V +S6
  BIND C +S7
  BIND X +S8
  BIND Z +S9
  BIND F +LOOKATWEAPON

// rates
FPS_MAX       0
FPS_MAX_UI    120
FPS_MAX_TOOLS 120

// hud
CL_HUD_COLOR                   11
CL_CROSSHAIR_DRAWOUTLINE       TRUE
CL_CROSSHAIR_FRIENDLY_WARNING  1
CL_CROSSHAIR_OUTLINETHICKNESS  1.5
CL_CROSSHAIR_RECOIL            TRUE
CL_CROSSHAIR_SNIPER_WIDTH      1
CL_CROSSHAIR_T                 FALSE
CL_CROSSHAIRALPHA              255
CL_CROSSHAIRCOLOR              5
CL_CROSSHAIRCOLOR_B            207
CL_CROSSHAIRCOLOR_G            159
CL_CROSSHAIRCOLOR_R            255
CL_CROSSHAIRDOT                FALSE
CL_CROSSHAIRGAP                -1.4
CL_CROSSHAIRGAP_USEWEAPONVALUE FALSE
CL_CROSSHAIRSIZE               2
CL_CROSSHAIRSTYLE              4
CL_CROSSHAIRTHICKNESS          0.5
CL_CROSSHAIRUSEALPHA           FALSE
R_SHOW_BUILD_INFO              FALSE

// misc
CL_INPUT_ENABLE_RAW_KEYBOARD TRUE
VIEWMODEL_OFFSET_X  1
VIEWMODEL_OFFSET_Y  1
VIEWMODEL_OFFSET_Z -1
SND_VOIPVOLUME      5
  BIND CAPSLOCK  +VOICERECORD
  BIND P          SAY "smoked"
  BIND BACKSPACE  DISCONNECT


// launch options:
// -testscript "../../csgo/cfg/.vtest"
// -disable_workshop_command_filtering
alias +MJ_ "duck 1 0 0"
alias -MJ_ "jump 1 0 0; MJ_"
alias MJ_ "exec ~/mj"
alias +JB_ "exec ~/+jb"
alias -JB_ "exec ~/-jb"
alias +CJ_ "exec ~/+cj"
alias -CJ_ "exec ~/-cj"
alias +C_ "exec ~/+c"
alias -C_ "exec ~/-c"
alias j_ "exec ~/j"
alias revert_tt "alias tt"
alias tt
