// desubtick jump
ALIAS +JUMP_         EXEC "~/+JUMP"
ALIAS -JUMP_         EXEC "~/-JUMP"
// BIND  MOUSE_WHEEL "+JUMP_;-JUMP_"
alias xx "+jump_;-jump_"
alias j0 "xx;bind mouse_wheel j1"
alias j1 "bind mouse_wheel j0"
bind mouse_wheel j0
cl_input_enable_raw_keyboard true

// jb - hold ctrl then scroll up
 BIND   MWHEELUP -DUCK_
 UNBIND MWHEELDOWN

// lj - hold space then scroll down
ALIAS LJDUCK EXEC "~/+DUCK"
ALIAS +LJ  "BIND MWHEELDOWN LJDUCK"
ALIAS -LJ "-DUCK_;UNBIND MWHEELDOWN"
 BIND SPACE +LJ

// wasd
EXEC "~/NULLS"
 BIND W +W
 BIND A +A
 BIND S +BACK
 BIND D +D

// sprint
 BIND SHIFT +SPRINT

// desubtick duck
ALIAS +DUCK_  EXEC "~/+DUCK"
ALIAS -DUCK_  EXEC "~/-DUCK"
 BIND  CTRL  +DUCK_

// mouse
SENSITIVITY 0.5
ZOOM_SENSITIVITY_RATIO 1
M_YAW 0.022
M_PITCH 0.022
 BIND MOUSE_X  YAW
 BIND MOUSE_Y  PITCH
 BIND MOUSE1  +ATTACK
 BIND MOUSE2  +ATTACK2

// quick switch hold
ALIAS +SWITCH  SLOT3
ALIAS -SWITCH  LASTINV
 BIND  Q      +SWITCH

// slots
ALIAS +S3 "SLOT3; +LOOKATWEAPON"; ALIAS -S3 -LOOKATWEAPON
ALIAS +S4 "SLOT4; +LOOKATWEAPON"; ALIAS -S4 -LOOKATWEAPON
ALIAS +S5 "SLOT5; +LOOKATWEAPON"; ALIAS -S5 -LOOKATWEAPON
ALIAS +S6 "SLOT6; +LOOKATWEAPON"; ALIAS -S6 -LOOKATWEAPON
ALIAS +S7 "SLOT7; +LOOKATWEAPON"; ALIAS -S7 -LOOKATWEAPON
ALIAS +S8 "SLOT8; +LOOKATWEAPON"; ALIAS -S8 -LOOKATWEAPON
ALIAS +S9 "SLOT10;+LOOKATWEAPON"; ALIAS -S9 -LOOKATWEAPON
 BIND 1 SLOT1
 BIND 2 SLOT2
 BIND 3 +S3
 BIND 4 +S4
 BIND 5 +S5
 BIND V +S6
 BIND C +S7
 BIND X +S8
 BIND Z +S9
 BIND F +LOOKATWEAPON

// rates
// 250hz mouse polling rate
FPS_MAX       240
FPS_MAX_UI    120
FPS_MAX_TOOLS 120

// misc
VIEWMODEL_OFFSET_X  1
VIEWMODEL_OFFSET_Y  1
VIEWMODEL_OFFSET_Z -1
SND_VOIPVOLUME      1.5
 BIND CAPSLOCK  +VOICERECORD
 BIND P          SAY "smoked"
 BIND BACKSPACE  DISCONNECT
